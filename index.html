<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposta Comercial · Bruna Hair</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #8b806f, #e8decc, #8b806f, #b3ae9a, #8d8c88);
  font-family: 'DM Sans', sans-serif;
  padding: 2rem;
}

.capa-card {
  background: #F5F0E8;
  border-radius: 20px;
  padding: 3rem 2.5rem 2.5rem;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 48px rgba(0,0,0,0.18);
}

.capa-icon {
  width: 52px;
  height: 52px;
  background: #1C1A17;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.75rem;
}

.capa-icon svg { width: 24px; height: 24px; }

.capa-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 400;
  color: #1C1A17;
  line-height: 1.25;
  margin-bottom: 0.85rem;
}

.capa-desc {
  font-size: 0.82rem;
  color: #7A6F62;
  line-height: 1.65;
  margin-bottom: 2rem;
}

.capa-btn {
  display: block;
  background: #1C1A17;
  color: #F5F0E8;
  text-decoration: none;
  padding: 0.95rem 2rem;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: background 0.2s;
}

.capa-btn:hover { background: #3D3529; }
</style>
</head>
<body>

  <div class="capa-card">
    <div class="capa-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="5" y="3" width="14" height="18" rx="2" stroke="#C4A882" stroke-width="1.5"/>
        <line x1="8" y1="8" x2="16" y2="8" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="12" x2="16" y2="12" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="16" x2="12" y2="16" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="capa-title">Sua proposta está pronta</div>
    <div class="capa-desc">Clique abaixo para visualizar todos<br>os detalhes da proposta.</div>
    
    <a class="capa-btn" href="proposta.html" target="_blank">Ver Proposta</a>
  </div>

</body>
</html>
